plugins {
    id 'com.android.application'
}

android {
    namespace 'com.brcm.bttestapp'
    compileSdk 35

    defaultConfig {
        applicationId 'com.brcm.bttestapp'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    sourceSets {
        main {
            manifest.srcFile '../AndroidManifest.xml'
            java.srcDirs = ['../src']
            res.srcDirs = ['../res']
        }
    }
}
